<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Stop the Jump</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0e1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #f1f5f9;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  .scene {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
    cursor: pointer;
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #cbd5e1;
    border-radius: 50%;
  }

  .cliff {
    position: absolute;
    bottom: 0;
    width: 30%;
    height: 30%;
    background: #1e293b;
  }
  .cliff::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #334155;
  }
  .cliff::after {
    content: '';
    position: absolute;
    top: 8px; left: 8%; right: 8%;
    height: 2px;
    background: #475569;
    border-radius: 2px;
  }
  .cliff.left { left: 0; }
  .cliff.right { right: 0; }

  .target {
    position: absolute;
    width: 14%;
    aspect-ratio: 2 / 1;
    pointer-events: none;
    will-change: transform;
    color: #ef4444;
  }
  .target svg { width: 100%; height: 100%; display: block; overflow: visible; }

  .car {
    position: absolute;
    width: 14%;
    aspect-ratio: 2 / 1;
    pointer-events: none;
    will-change: transform;
  }
  .car svg { width: 100%; height: 100%; display: block; }

  .top-bar {
    position: absolute;
    top: env(safe-area-inset-top, 0px);
    left: 0; right: 0;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
    pointer-events: none;
  }
  .stat {
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .stat strong {
    display: block;
    font-size: 28px;
    color: #f1f5f9;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .stat.right { text-align: right; }

  .hint {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 8%);
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    z-index: 10;
    pointer-events: none;
    animation: pulse 1.4s ease-in-out infinite;
    white-space: nowrap;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }

  .feedback {
    position: absolute;
    top: 32%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 180ms ease, transform 240ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .feedback.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .feedback .label {
    font-size: clamp(40px, 11vw, 72px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .feedback .points {
    font-size: 14px;
    color: #94a3b8;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 600;
  }

  .retry-btn {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 8%);
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    padding: 14px 36px;
    background: #f1f5f9;
    color: #0a0e1a;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    cursor: pointer;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease, transform 240ms cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: inherit;
  }
  .retry-btn.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .retry-btn:active { background: #cbd5e1; }

  .perfect { color: #22c55e; }
  .great   { color: #84cc16; }
  .good    { color: #eab308; }
  .close   { color: #f97316; }
  .miss    { color: #ef4444; }

  .target.hit { color: #22c55e; }

  /* small ground mark under each cliff so it feels grounded */
  .ground-line {
    position: absolute;
    bottom: 30%;
    width: 30%;
    height: 1px;
    background: #475569;
    opacity: 0.4;
  }
  .ground-line.left { left: 0; }
  .ground-line.right { right: 0; }
</style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="cliff left"></div>
    <div class="cliff right"></div>
    <div class="ground-line left"></div>
    <div class="ground-line right"></div>

    <div class="target" id="target">
      <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
        <path d="M 18 22 L 28 8 L 72 8 L 82 22 L 92 22 A 5 5 0 0 1 97 27 L 97 37 A 5 5 0 0 1 92 42 L 82 42 A 7 7 0 0 1 68 42 L 32 42 A 7 7 0 0 1 18 42 L 8 42 A 5 5 0 0 1 3 37 L 3 27 A 5 5 0 0 1 8 22 Z"
              fill="currentColor" fill-opacity="0.06"
              stroke="currentColor" stroke-width="2.5"
              vector-effect="non-scaling-stroke"
              stroke-dasharray="4 3" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="car" id="car">
      <svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="22" width="94" height="20" rx="5" fill="#ef4444"/>
        <path d="M 18 22 L 28 8 L 72 8 L 82 22 Z" fill="#dc2626"/>
        <rect x="30" y="11" width="40" height="11" rx="2" fill="#0f172a"/>
        <line x1="50" y1="11" x2="50" y2="22" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="25" cy="42" r="7" fill="#0a0e1a"/>
        <circle cx="25" cy="42" r="3" fill="#64748b"/>
        <circle cx="75" cy="42" r="7" fill="#0a0e1a"/>
        <circle cx="75" cy="42" r="3" fill="#64748b"/>
        <rect x="2" y="28" width="5" height="4" rx="1" fill="#fbbf24"/>
        <rect x="93" y="28" width="5" height="4" rx="1" fill="#991b1b"/>
      </svg>
    </div>

    <div class="top-bar">
      <div class="stat">
        <span>Score</span>
        <strong id="score">—</strong>
      </div>
      <div class="stat right">
        <span>Best</span>
        <strong id="best">0</strong>
      </div>
    </div>

    <div class="hint" id="hint">Tap anywhere to stop</div>

    <div class="feedback" id="feedback">
      <div class="label" id="feedback-label">PERFECT!</div>
      <div class="points" id="feedback-points">+100</div>
    </div>

    <button class="retry-btn" id="retry">Tap to retry</button>
  </div>

<script>
  const scene = document.getElementById('scene');
  const car = document.getElementById('car');
  const target = document.getElementById('target');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const feedback = document.getElementById('feedback');
  const feedbackLabel = document.getElementById('feedback-label');
  const feedbackPoints = document.getElementById('feedback-points');
  const retryBtn = document.getElementById('retry');
  const hint = document.getElementById('hint');

  // sprinkle stars in the upper sky
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top  = Math.random() * 65 + '%';
    s.style.opacity = (Math.random() * 0.5 + 0.25).toFixed(2);
    const size = Math.random() < 0.15 ? 3 : 2;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    scene.appendChild(s);
  }

  // Parabolic arc between two cliffs (coords in % of viewport).
  // Cliff tops sit at y=70%, peak of jump at y=25%.
  // y = a(x-50)^2 + 25, with y=70 at x=8 → a = 45 / (42^2) ≈ 0.02551
  const A = 45 / (42 * 42);
  function trajectory(progress) {
    const x = 8 + 84 * progress;
    const y = A * (x - 50) * (x - 50) + 25;
    const slope = 2 * A * (x - 50);
    // visual rotation — flatten a touch so it doesn't over-rotate
    const angle = Math.atan(slope) * 180 / Math.PI * 0.85;
    return { x, y, angle };
  }

  // The target sits at a fixed point on the arc — slightly past the peak.
  const TARGET_PROGRESS = 0.58;
  const tp = trajectory(TARGET_PROGRESS);
  target.style.left = tp.x + '%';
  target.style.top  = tp.y + '%';
  target.style.transform = `translate(-50%, -50%) rotate(${tp.angle}deg)`;

  // Game state
  let progress = 0;
  let frozen = false;
  let lastTime = performance.now();
  const SPEED_PER_SEC = 0.85;   // ~1.18s per loop — fast but readable
  let best = parseInt(localStorage.getItem('stopJumpBest') || '0', 10);
  bestEl.textContent = best;

  function placeCar() {
    const p = trajectory(progress);
    car.style.left = p.x + '%';
    car.style.top  = p.y + '%';
    car.style.transform = `translate(-50%, -50%) rotate(${p.angle}deg)`;
  }

  function loop(time) {
    const dt = Math.min(0.05, (time - lastTime) / 1000);
    lastTime = time;
    if (!frozen) {
      progress = (progress + SPEED_PER_SEC * dt) % 1;
      placeCar();
    }
    requestAnimationFrame(loop);
  }

  function grade(distance) {
    const score = Math.max(0, Math.round(100 - distance * 1000));
    if (distance < 0.005) return { score, label: 'PERFECT!', cls: 'perfect', perfect: true };
    if (distance < 0.02)  return { score, label: 'GREAT!',   cls: 'great',   perfect: false };
    if (distance < 0.05)  return { score, label: 'GOOD',     cls: 'good',    perfect: false };
    if (distance < 0.10)  return { score, label: 'CLOSE',    cls: 'close',   perfect: false };
    return { score: 0, label: 'MISS!', cls: 'miss', perfect: false };
  }

  function freezeNow() {
    if (frozen) return;
    frozen = true;

    // wrap the progress distance so 0.99 vs 0.01 isn't punished
    let d = Math.abs(progress - TARGET_PROGRESS);
    if (d > 0.5) d = 1 - d;

    const r = grade(d);
    scoreEl.textContent = r.score;
    feedbackLabel.textContent = r.label;
    feedbackLabel.className = 'label ' + r.cls;
    feedbackPoints.textContent = r.score > 0 ? ('+' + r.score + ' POINTS') : 'TRY AGAIN';
    feedback.classList.add('show');
    hint.style.display = 'none';

    if (r.perfect) target.classList.add('hit');

    if (r.score > best) {
      best = r.score;
      bestEl.textContent = best;
      localStorage.setItem('stopJumpBest', best.toString());
    }

    if (navigator.vibrate) navigator.vibrate(r.perfect ? [30, 40, 30] : 25);

    setTimeout(() => retryBtn.classList.add('show'), 380);
  }

  function reset() {
    frozen = false;
    progress = 0;
    feedback.classList.remove('show');
    retryBtn.classList.remove('show');
    target.classList.remove('hit');
    hint.style.display = '';
    lastTime = performance.now();
    placeCar();
  }

  // tap anywhere — freeze, or restart if already frozen
  scene.addEventListener('pointerdown', (e) => {
    if (e.target === retryBtn) return;
    if (frozen) reset();
    else freezeNow();
  });

  retryBtn.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    reset();
  });

  // prevent iOS double-tap zoom etc.
  document.addEventListener('gesturestart', (e) => e.preventDefault());

  placeCar();
  requestAnimationFrame((t) => { lastTime = t; loop(t); });
</script>
</body>
</html>
